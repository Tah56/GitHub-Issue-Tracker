<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker | HOME</title>
    <link rel="stylesheet" href="./style/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Hind+Siliguri:wght@300;400;500;600;700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
</head>
<body>
    <header class=" bg-base-100 shadow-sm">
        <div class="navbar  flex-col lg:flex-row  justify-between w-11/12 mx-auto">
  <div class=" flex items-center gap-0.5 ">
    <div class="w-10">
     <img src="./assets/github-logo.png" alt="">
    </div>
    <h2 class="text-2xl font-semibold">GitHub Issues Tracker</h2>
  </div>
  <div class="flex gap-1">
    <input id="search-box" type="text" placeholder="Search" class="input input-bordered w-24 md:w-auto" />
    <div class="dropdown dropdown-end">
      
    <button id="search-btn" onclick="search()" class="btn btn-primary"><i class="fa-solid fa-plus"></i>New Issue</button>
      
    </div>
  </div>
</div>
    </header>
    <main id="main" class="py-16 bg-[#F8FAFC]">
        <div class=" grid grid-cols-1 md:grid-cols-4 grid-rows-1 gap-5 w-9/12 mx-auto">
           <div id="all-btn" class="w-full p-5 flex gap-1 col-span-4 py-5 row-span-1 rounded-md shadow-[0_1px_6px_rgba(0,0,0,0.2)]">
           <button onclick="toggole(id)" id="btn-all" class="btn btn-primary  ">all</button>
           <button onclick="toggole(id)" id="btn-open"
            class="btn remove">Open</button>
           <button onclick="toggole(id)" id="btn-closed" class="btn remove">Closed</button>
           </div>



           <div class=" col-span-4 ">

          <div class="flex md:justify-between flex-wrap items-center justify-center w-full p-5 rounded-t-md shadow-[0_1px_6px_rgba(0,0,0,0.2)] space-y-5">
            <div class="flex gap-2 ">
                <div class="w-20 h-10  flex items-center justify-center bg-[#ECE4FF] rounded-full ">
    
                    <img class="mx-auto my-1" src="./assets/Aperture.png" alt="">
                </div>
                <div>
                    <h2 class="font-semibold text-xl"><span id="issue-length"></span>Issues</h2>
                    <p class="text-[#64748B]">Track and manage your project issues</p>
                </div>
            </div>
            <div class="flex gap-4">
                <p>Open</p>
                <p>Closed</p>
            </div>
          </div>

          <hr class="col-span-full text-[#E4E4E7]">

          <div id="spinner" class=" flex justify-center items-center">
            <span   class="loading loading-spinner loading-xl "></span>

          </div>
          <!-- MAIN CARD SECTION START -->

          <div id="card-data" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 place-items-center p-4 md:p-6 gap-5 w-full h-fit bg-[#FBFBFB] shadow-[0_3px_6px_rgba(0,0,0,0.08)]">

            
            
         
           </div>
          <div id="card-data-1" class="  grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4  p-4 md:p-6 gap-5 bg-[#FBFBFB] shadow-[0_3px_6px_rgba(0,0,0,0.08)]">

            
            
         
           </div>
          <div id="card-data-2" class="  grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 p-4  md:p-6 gap-5 bg-[#FBFBFB] shadow-[0_3px_6px_rgba(0,0,0,0.08)]">

            
            
         
           </div>
<!-- Open the modal using ID.showModal() method -->
<dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle">
  <div id="word" class="modal-box">
    
  </div>
</dialog>

           </div>
        </div>
    </main>
    <script src="./script/home-script.js"></script>
</body>
</html>
